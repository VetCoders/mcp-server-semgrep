on:
  workflow_dispatch: {}
  pull_request: {}
  push:
    branches:
    - main
    - master
    paths:
    - .github/workflows/semgrep.yml
  schedule:
  # random HH:MM to avoid a load spike on GitHub Actions at 00:00
  - cron: 2 16 * * *
name: Semgrep
jobs:
  semgrep:
    name: semgrep/ci
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Install Semgrep
      run: python3 -m pip install --upgrade pip semgrep
    - name: Run Semgrep
      env:
        SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      run: |
        if [ -n "${SEMGREP_APP_TOKEN:-}" ]; then
          echo "Running semgrep ci with SEMGREP_APP_TOKEN from GitHub Actions secrets."
          semgrep ci
        else
          echo "SEMGREP_APP_TOKEN is not available. Falling back to OSS ruleset."
          semgrep --config p/ci --error .
        fi
